<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Travel Itinerary Overview</title>
  <style>
    :root {
      --bg: #020816;
      --panel: rgba(8, 22, 40, .62);
      --panel-strong: rgba(12, 31, 54, .82);
      --line: rgba(188, 219, 255, .22);
      --text: #f4f8ff;
      --muted: #b4c6dd;
      --blue: #49a1ff;
      --cyan: #42d6ff;
      --pink: #ff4da0;
      --green: #57df7d;
      --amber: #ffd166;
      --shadow-blue: 0 0 28px rgba(54, 146, 255, .72);
      --shadow-pink: 0 0 28px rgba(255, 64, 151, .78);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 80% 6%, rgba(63, 151, 255, .32), transparent 28%),
        radial-gradient(circle at 12% 18%, rgba(255, 68, 163, .16), transparent 22%),
        linear-gradient(180deg, #030814 0%, #061020 58%, #02050d 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.7) 0 1px, transparent 1.7px),
        radial-gradient(circle, rgba(100,178,255,.5) 0 1px, transparent 1.8px);
      background-size: 110px 90px, 180px 140px;
      background-position: 16px 10px, 60px 32px;
      opacity: .22;
    }

    .app {
      position: relative;
      display: grid;
      grid-template-columns: clamp(360px, 28vw, 460px) minmax(0, 1fr);
      grid-template-rows: auto 1fr auto;
      gap: 18px;
      width: 100%;
      max-width: 100vw;
      min-height: 100vh;
      padding: 18px 22px;
      overflow: hidden;
    }

    header {
      grid-column: 2;
      z-index: 2;
      padding: 8px 10px 0;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-family: "Cormorant Garamond", "Playfair Display", Georgia, "Times New Roman", serif;
      font-size: clamp(2.4rem, 5.2vw, 5.5rem);
      line-height: .95;
      font-weight: 500;
      letter-spacing: 0;
      text-shadow: 0 0 24px rgba(255,255,255,.26);
    }

    .desktop-title-word {
      display: inline;
    }

    .route-line {
      margin-top: 12px;
      color: #d8e9ff;
      font-size: clamp(1rem, 2vw, 1.95rem);
      letter-spacing: .08em;
      text-shadow: 0 0 16px rgba(73,161,255,.68);
    }

    .status-panel {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      max-width: 920px;
      margin-top: 16px;
      padding: 12px;
      border: 1px solid rgba(190, 222, 255, .24);
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(10, 27, 48, .72), rgba(5, 17, 33, .48));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.09), 0 14px 34px rgba(0,0,0,.22);
      backdrop-filter: blur(16px);
    }

    .status-item {
      min-width: 0;
      padding: 4px 6px;
    }

    .status-label {
      display: block;
      color: rgba(197, 217, 239, .72);
      font-size: .68rem;
      font-weight: 800;
      letter-spacing: .13em;
      line-height: 1.3;
      text-transform: uppercase;
    }

    .status-value {
      display: block;
      margin-top: 4px;
      color: #f7fbff;
      font-size: .9rem;
      font-weight: 750;
      line-height: 1.3;
    }

    .status-item.next-action {
      grid-column: 1 / -1;
      border-top: 1px solid rgba(206, 229, 255, .14);
      padding-top: 10px;
    }

    .timeline-shell {
      grid-row: 1 / 4;
      position: relative;
      z-index: 3;
      border: 1px solid rgba(202, 226, 255, .35);
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(13, 31, 54, .84), rgba(2, 15, 29, .58));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.1), 0 24px 80px rgba(0,0,0,.42);
      backdrop-filter: blur(18px);
      padding: 18px 16px;
      min-height: calc(100vh - 36px);
      min-width: 0;
    }

    .section-heading {
      display: none;
    }

    .timeline {
      display: grid;
      gap: 9px;
      position: relative;
      padding-left: 24px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 15px;
      top: 26px;
      bottom: 34px;
      width: 3px;
      border-radius: 999px;
      background: linear-gradient(var(--pink), var(--blue) 30%, var(--blue) 74%, var(--pink));
      box-shadow: 0 0 24px rgba(73,161,255,.78);
    }

    .leg {
      position: relative;
      display: grid;
      grid-template-columns: 54px 1fr;
      gap: 12px;
      align-items: center;
      width: 100%;
      color: inherit;
      border: 1px solid rgba(184, 215, 255, .18);
      border-radius: 14px;
      background: rgba(3, 18, 35, .54);
      padding: 13px 14px 13px 22px;
      text-align: left;
      cursor: pointer;
      transition: transform .25s ease, border-color .25s ease, background .25s ease, box-shadow .25s ease, opacity .25s ease;
      min-height: 82px;
    }

    .leg:hover,
    .leg:focus-visible {
      outline: none;
      transform: translateX(3px);
      border-color: rgba(107, 180, 255, .7);
      box-shadow: 0 0 0 1px rgba(73,161,255,.18), var(--shadow-blue);
    }

    .leg.segment-0 { --seg-color: 255, 77, 160; --seg-bg-a: 43, 18, 50; --seg-bg-b: 7, 28, 50; }
    .leg.segment-1 { --seg-color: 66, 214, 255; --seg-bg-a: 6, 38, 58; --seg-bg-b: 5, 24, 45; }
    .leg.segment-2 { --seg-color: 255, 209, 102; --seg-bg-a: 48, 39, 13; --seg-bg-b: 7, 32, 41; }

    .leg.segment-selected {
      border-color: rgba(var(--seg-color), .74);
      background: linear-gradient(135deg, rgba(var(--seg-bg-a), .84), rgba(var(--seg-bg-b), .74));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.1), 0 0 28px rgba(var(--seg-color), .58);
      opacity: 1;
    }

    .leg.expanded {
      min-height: 186px;
      align-items: start;
    }

    .leg.dimmed { opacity: .72; }

    .orb {
      position: absolute;
      left: -25px;
      top: 16px;
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      color: white;
      font-weight: 800;
      border: 2px solid currentColor;
      background: rgba(5, 19, 37, .9);
      box-shadow: 0 0 18px currentColor, inset 0 0 12px currentColor;
    }

    .leg.expanded .orb {
      width: 48px;
      height: 48px;
      left: -28px;
    }

    .airline-icon {
      display: grid;
      place-items: center;
      font-size: 2.15rem;
      color: var(--blue);
      filter: drop-shadow(0 0 10px currentColor);
    }

    .leg.pink .orb,
    .leg.pink .airline-icon,
    .leg.pink .date,
    .leg.pink .plus-day { color: var(--pink); }

    .leg.segment-selected .orb,
    .leg.segment-selected .airline-icon,
    .leg.segment-selected .date,
    .leg.segment-selected .plus-day {
      color: rgb(var(--seg-color));
    }

    .date {
      color: var(--blue);
      font-weight: 800;
      font-size: 1rem;
    }

    .route {
      margin-top: 4px;
      font-weight: 720;
      font-size: .98rem;
      color: white;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      margin-top: 8px;
      color: var(--muted);
      font-size: .86rem;
      align-items: center;
    }

    .airline {
      font-weight: 800;
      color: white;
    }

    .klm { color: #35c8ff; }
    .ci { color: #ffe0ef; }

    .details {
      display: none;
      grid-column: 1 / -1;
      margin-top: 12px;
      color: #d8e8fb;
      line-height: 1.45;
      font-size: .87rem;
    }

    .leg.expanded .details {
      display: grid;
      gap: 8px;
    }

    .detail-row {
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid rgba(210, 232, 255, .14);
      background: rgba(255,255,255,.045);
    }

    .collapse {
      position: absolute;
      top: 10px;
      right: 12px;
      color: rgba(255,255,255,.78);
      font-size: .9rem;
    }

    .globe-stage {
      grid-column: 2;
      grid-row: 2;
      position: relative;
      --map-scale: 1.18;
      --map-x: -8%;
      --map-y: -8%;
      min-width: 0;
      min-height: 560px;
      overflow: hidden;
      border-radius: 18px;
    }

    .earth {
      position: absolute;
      left: 2%;
      right: 0;
      bottom: -26%;
      height: min(72vw, 760px);
      min-height: 520px;
      border-radius: 50% 50% 0 0 / 58% 58% 0 0;
      background:
        radial-gradient(circle at 52% 0%, rgba(255,255,255,.42), transparent 3%),
        radial-gradient(circle at 56% 30%, rgba(255,255,255,.08), transparent 6%),
        radial-gradient(ellipse at 52% 18%, rgba(144, 199, 255, .58), transparent 16%),
        radial-gradient(ellipse at 50% 18%, rgba(18, 77, 135, .82), transparent 42%),
        linear-gradient(135deg, transparent 0 28%, rgba(141, 110, 78, .24) 29% 34%, transparent 35% 45%, rgba(117, 103, 73, .22) 46% 52%, transparent 53%),
        linear-gradient(40deg, transparent 0 19%, rgba(76, 91, 78, .35) 20% 26%, transparent 27% 48%, rgba(82, 72, 52, .32) 49% 56%, transparent 57%),
        radial-gradient(ellipse at 50% 38%, #0d3157 0%, #061a31 48%, #021020 72%);
      box-shadow:
        inset 0 24px 38px rgba(222, 242, 255, .24),
        inset 0 -90px 120px rgba(0,0,0,.72),
        0 -8px 34px rgba(92, 177, 255, .68);
      filter: saturate(1.2);
    }

    .earth::after {
      content: "";
      position: absolute;
      inset: 4% 7% 0;
      opacity: .38;
      background-image:
        radial-gradient(circle, rgba(255,220,153,.95) 0 1.3px, transparent 1.8px),
        radial-gradient(circle, rgba(164,213,255,.8) 0 1px, transparent 1.7px);
      background-size: 42px 30px, 68px 46px;
      mask-image: radial-gradient(ellipse at center, black 0 58%, transparent 73%);
    }

    .world-map {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      opacity: .42;
      filter: drop-shadow(0 0 9px rgba(102, 188, 255, .22));
      transform: translate(var(--map-x), var(--map-y)) scale(var(--map-scale));
      transform-origin: center center;
      pointer-events: none;
    }

    .land {
      fill: rgba(172, 209, 224, .15);
      stroke: rgba(217, 239, 255, .32);
      stroke-width: .8;
      vector-effect: non-scaling-stroke;
    }
.routes-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      z-index: 2;
      transform: translate(var(--map-x), var(--map-y)) scale(var(--map-scale));
      transform-origin: center center;
    }

    .flight-path {
      fill: none;
      stroke-width: 3.4;
      stroke-linecap: round;
      opacity: .46;
      filter: drop-shadow(0 0 8px currentColor);
      transition: opacity .25s ease, stroke-width .25s ease;
    }

    .flight-path.active {
      opacity: 1;
      stroke-width: 5;
      stroke-dasharray: 10 12;
      animation: dash 1.2s linear infinite;
    }

    @keyframes dash { to { stroke-dashoffset: -44; } }

    .marker {
      position: absolute;
      display: grid;
      place-items: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 3px solid white;
      background: var(--blue);
      box-shadow: 0 0 18px var(--blue), 0 0 34px var(--blue);
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    .marker.active {
      width: 31px;
      height: 31px;
      background: var(--pink);
      box-shadow: 0 0 24px var(--pink), 0 0 46px var(--pink);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      50% { transform: translate(-50%, -50%) scale(1.16); }
    }

    .city-label {
      position: absolute;
      z-index: 3;
      font-weight: 800;
      line-height: 1.08;
      text-align: center;
      text-shadow: 0 2px 12px #000, 0 0 12px rgba(255,255,255,.35);
      pointer-events: none;
    }

    .plane-mover {
      position: absolute;
      z-index: 4;
      left: 0;
      top: 0;
      font-size: 2rem;
      color: white;
      filter: drop-shadow(0 0 14px var(--blue));
      transform-origin: center;
      will-change: transform;
    }

    .sky-plane {
      position: absolute;
      right: 5%;
      top: 4%;
      font-size: clamp(2.3rem, 5vw, 4.4rem);
      color: white;
      transform: rotate(-16deg);
      filter: drop-shadow(0 0 20px var(--blue));
    }

    .sky-plane::after {
      content: "";
      position: absolute;
      right: -210px;
      top: 38%;
      width: 250px;
      height: 70px;
      border-top: 4px solid rgba(73,161,255,.85);
      border-radius: 50%;
      box-shadow: 0 -12px 24px rgba(73,161,255,.45);
    }

    .bottom {
      grid-column: 2;
      grid-row: 3;
      z-index: 4;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding-bottom: 8px;
      min-width: 0;
    }

    .nav-btn {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid rgba(191, 222, 255, .36);
      color: white;
      background: rgba(8, 24, 43, .48);
      box-shadow: 0 0 18px rgba(73,161,255,.28);
      cursor: pointer;
      font-size: 2rem;
    }

    .cards {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(128px, 1fr);
      gap: 12px;
      overflow: hidden;
      min-width: 0;
    }

    .info-card {
      min-height: 154px;
      border: 1px solid rgba(206, 229, 255, .38);
      border-radius: 14px;
      background: linear-gradient(145deg, rgba(15, 34, 57, .76), rgba(2, 15, 29, .62));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.13), 0 14px 38px rgba(0,0,0,.26);
      backdrop-filter: blur(16px);
      padding: 16px 14px;
      display: grid;
      align-content: space-between;
      justify-items: center;
      text-align: center;
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease, opacity .25s ease;
      cursor: pointer;
    }

    .info-card.related,
    .info-card.active-segment {
      border-color: rgba(94, 226, 128, .7);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16), 0 0 26px rgba(72, 220, 116, .42);
      transform: translateY(-5px);
    }

    .info-card.segment-card-0.active-segment {
      border-color: rgba(255, 77, 160, .72);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16), 0 0 26px rgba(255, 77, 160, .42);
    }

    .info-card.segment-card-1.active-segment {
      border-color: rgba(66, 214, 255, .72);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16), 0 0 26px rgba(66, 214, 255, .42);
    }

    .info-card.segment-card-2.active-segment {
      border-color: rgba(255, 209, 102, .72);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16), 0 0 26px rgba(255, 209, 102, .36);
    }

    .info-card:hover,
    .info-card:focus-visible {
      outline: none;
      border-color: rgba(111, 190, 255, .7);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16), 0 0 24px rgba(73,161,255,.46);
    }

    .info-card.faded { opacity: .62; }

    .info-card.faded .check {
      opacity: 0;
      transform: scale(.72);
    }

    .card-icon {
      font-size: 2.65rem;
      color: #b9d9ff;
      filter: drop-shadow(0 0 12px var(--blue));
    }

    .card-title {
      margin-top: 5px;
      font-weight: 760;
      font-size: .98rem;
    }

    .card-copy {
      margin-top: 6px;
      color: var(--muted);
      font-size: .84rem;
      line-height: 1.35;
    }

    .check {
      display: grid;
      place-items: center;
      width: 27px;
      height: 27px;
      margin-top: 10px;
      border-radius: 50%;
      color: white;
      background: rgba(58, 187, 90, .82);
      box-shadow: 0 0 12px rgba(82, 229, 118, .72);
      font-weight: 900;
    }

    .dots {
      grid-column: 2;
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: rgba(190, 210, 235, .52);
    }

    .dot.active {
      background: var(--blue);
      box-shadow: 0 0 14px var(--blue);
    }

    .mobile-active {
      display: none;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto auto;
        padding: 14px;
        gap: 14px;
      }

      header,
      .globe-stage,
      .bottom {
        grid-column: 1;
        grid-row: auto;
      }

      .timeline-shell {
        grid-column: 1;
        grid-row: auto;
        min-height: 0;
        order: 2;
        width: 100%;
      }

      header { order: 1; padding-left: 2px; }
      .bottom { order: 2; }
      .globe-stage { order: 3; width: 100%; min-height: 420px; }
      .timeline-shell { order: 4; }
      .cards { grid-auto-columns: minmax(190px, 48%); overflow-x: auto; padding: 8px 2px 16px; scroll-snap-type: x mandatory; }
      .info-card { scroll-snap-align: center; }
      .timeline { padding-left: 20px; }
    }

    @media (max-width: 620px) {
      header {
        padding-top: 2px;
      }

      h1 {
        font-size: clamp(2.15rem, 11vw, 2.9rem);
        line-height: .92;
        max-width: 330px;
      }

      .desktop-title-word {
        display: none;
      }

      .route-line {
        margin-top: 10px;
        font-size: .78rem;
        line-height: 1.25;
        letter-spacing: .035em;
        white-space: nowrap;
      }

      .status-panel {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 7px;
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 12px;
      }

      .status-item {
        padding: 0;
      }

      .status-item.next-action {
        grid-column: 1 / -1;
        padding-top: 8px;
      }

      .status-item:nth-child(3) {
        grid-column: 1 / -1;
      }

      .status-label {
        font-size: .62rem;
      }

      .status-value {
        margin-top: 2px;
        font-size: .78rem;
        line-height: 1.32;
      }

      .timeline-shell {
        border-radius: 18px;
        padding: 14px 12px;
      }

      .section-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 0 0 12px 36px;
        color: #eaf4ff;
        font-size: .78rem;
        font-weight: 800;
        letter-spacing: .16em;
        text-transform: uppercase;
      }

      .section-heading span:last-child {
        color: var(--muted);
        font-size: .72rem;
        font-weight: 700;
        letter-spacing: .08em;
        text-transform: none;
      }

      .leg {
        grid-template-columns: 38px 1fr;
        padding-right: 10px;
      }

      .airline-icon { font-size: 1.65rem; }
      .route { font-size: .9rem; }
      .meta { font-size: .78rem; }
      .bottom {
        grid-template-columns: 1fr;
        gap: 0;
        padding-bottom: 0;
      }
      .nav-btn { display: none; }
      .cards {
        grid-auto-flow: row;
        grid-auto-columns: unset;
        grid-template-columns: 1fr;
        gap: 7px;
        overflow: visible;
        padding: 0;
      }
      .info-card {
        min-height: 88px;
        grid-template-columns: 1fr 28px;
        justify-items: start;
        align-items: center;
        text-align: left;
        padding: 10px 12px;
        border-radius: 12px;
      }
      .info-card > div:first-child {
        display: grid;
        grid-template-columns: 36px 1fr;
        grid-template-rows: auto auto auto;
        column-gap: 9px;
        align-items: center;
        width: 100%;
      }
      .info-card .card-title,
      .info-card .card-copy {
        grid-column: 2;
      }
      .card-icon {
        grid-row: 1 / 3;
        font-size: 1.65rem;
      }
      .card-title {
        margin-top: 0;
        font-size: .9rem;
        line-height: 1.12;
      }
      .card-copy {
        display: -webkit-box;
        margin-top: 4px;
        font-size: .72rem;
        line-height: 1.25;
        color: rgba(210, 226, 245, .74);
        overflow: hidden;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }
      .check {
        margin-top: 0;
        width: 24px;
        height: 24px;
      }
      .dots { display: none; }
      .globe-stage {
        --map-scale: 1.34;
        --map-x: -14%;
        --map-y: -7%;
        min-height: 330px;
        border-radius: 15px;
      }
      .world-map {
        opacity: .58;
      }
      .earth { left: -36%; right: -34%; height: 510px; min-height: 390px; }
      .city-label {
        font-size: .84rem;
        line-height: 1.05;
      }
      .marker.active {
        width: 28px;
        height: 28px;
      }
      .sky-plane::after { width: 140px; right: -118px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {

    const statusPanel = document.querySelector("#statusPanel");
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    function airportCode(label) {
      return label.match(/\(([^)]+)\)/)[1];
    }

    function mapPointToStage(xPercent, yPercent) {
      const styles = getComputedStyle(globeStage);
      const scale = parseFloat(styles.getPropertyValue("--map-scale")) || 1;
      const offsetX = parseFloat(styles.getPropertyValue("--map-x")) || 0;
      const offsetY = parseFloat(styles.getPropertyValue("--map-y")) || 0;
      return {
        x: offsetX + 50 + (xPercent - 50) * scale,
        y: offsetY + 50 + (yPercent - 50) * scale
      };
    }

    function renderTimeline() {
      const selectedSegment = legs[active].segment;
      timeline.innerHTML = legs.map((leg, index) => `
        <button class="leg segment-${leg.segment} ${leg.tone === "pink" ? "pink" : ""} ${leg.segment === selectedSegment ? "segment-selected" : "dimmed"} ${expandedLegs.has(index) ? "expanded" : ""} ${index === active ? "active" : ""}" type="button" data-index="${index}" aria-expanded="${expandedLegs.has(index)}" aria-label="Flight ${index + 1}: ${leg.from} to ${leg.to}, ${leg.airline} ${leg.flight}. ${expandedLegs.has(index) ? "Collapse details" : "Expand details"}">
          <span class="orb">${index + 1}</span>
          <span class="airline-icon">&#9992;</span>
          <span>
            <span class="date">${leg.date}</span>
            <span class="route">${leg.from} &rarr; ${leg.to}</span>
            <span class="meta">
              <span class="airline ${leg.airlineClass}">${leg.airline}</span>
              <span>${leg.flight}</span>
              <span>Dep ${leg.dep}</span>
              <span>|</span>
              <span>Arr ${leg.arr}</span>
              ${leg.plus ? `<span class="plus-day">(${leg.plus})</span>` : ""}
            </span>
          </span>
          <span class="details">
            ${leg.details.map(([label, value]) => `<span class="detail-row"><strong>${label}:</strong> ${value}</span>`).join("")}
          </span>
        </button>
      `).join("");
      timeline.querySelectorAll(".leg").forEach(button => {
        button.addEventListener("click", () => toggleLeg(Number(button.dataset.index)));
      });
    }

    function renderMarkers() {
      const segmentCities = new Set();
      tripSegments[legs[active].segment].legs.forEach(index => {
        segmentCities.add(airportCode(legs[index].from));
        segmentCities.add(airportCode(legs[index].to));
      });
      markerLayer.innerHTML = Object.values(cities).map(city => {
        const onRoute = segmentCities.has(city.code);
        const point = mapPointToStage(city.x, city.y);
        return `
          <span class="marker ${onRoute ? "active" : ""}" style="left:${point.x}%; top:${point.y}%"></span>
          <span class="city-label" style="left:${point.x}%; top:${point.y}%; transform: translate(calc(-50% + ${city.labelX || 0}px), ${city.labelY ?? 16}px)">${city.name}<br>(${city.code})</span>
        `;
      }).join("");
    }

    function renderCards() {
      const activeSegment = legs[active].segment;
      cardLayer.innerHTML = tripSegments.map((card, index) => `
        <article class="info-card segment-card-${index} ${index === activeSegment ? "active-segment" : "faded"}" tabindex="0" role="button" data-segment="${index}" aria-pressed="${index === activeSegment}" aria-label="View trip phase: ${card.title}, route ${card.route}">
          <div>
            <div class="card-icon">${card.icon}</div>
            <div class="card-title">${card.title}</div>
            <div class="card-title">${card.route}</div>
            <div class="card-copy">${card.copy}</div>
          </div>
          <div class="check">&#10003;</div>
        </article>
      `).join("");
      cardLayer.querySelectorAll(".info-card").forEach(card => {
        card.addEventListener("click", () => setSegment(Number(card.dataset.segment)));
        card.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            setSegment(Number(card.dataset.segment));
          }
        });
      });
      dots.innerHTML = tripSegments.map((_, index) => `<span class="dot ${index === activeSegment ? "active" : ""}"></span>`).join("");
      const card = cardLayer.children[activeSegment];
      if (card) card.scrollIntoView({ inline: "center", block: "nearest", behavior: "smooth" });
    }

    function renderStatus() {
      const activeSegment = legs[active].segment;
      const status = statusBySegment[activeSegment];
      statusPanel.innerHTML = `
        <div class="status-item">
          <span class="status-label">Viewing</span>
          <span class="status-value">${status.viewing}</span>
        </div>
        <div class="status-item">
          <span class="status-label">Focus</span>
          <span class="status-value">${status.focus}</span>
        </div>
        <div class="status-item">
          <span class="status-label">Reminder</span>
          <span class="status-value">${status.reminder}</span>
        </div>
        <div class="status-item next-action">
          <span class="status-label">Next Action</span>
          <span class="status-value">${status.nextAction}</span>
        </div>
      `;
    }

    function renderRoutes() {
      const segment = tripSegments[legs[active].segment];
      const segmentLegs = new Set(segment.legs);
      document.querySelectorAll(".flight-path").forEach((path, index) => {
        path.classList.toggle("active", segmentLegs.has(index));
      });
      activePathEls = segment.legs.map(index => document.querySelector(`#path-${index}`));
      activePathLengths = activePathEls.map(path => path.getTotalLength());
      activeTotalPathLength = activePathLengths.reduce((sum, length) => sum + length, 0);
      animationStart = performance.now();
      plane.style.color = legs[active].tone === "pink" ? "var(--pink)" : "white";
      plane.style.filter = legs[active].tone === "pink" ? "drop-shadow(0 0 16px var(--pink))" : "drop-shadow(0 0 16px var(--blue))";
      positionPlane(animationStart);
    }

    function positionPlane(now) {
      if (!activePathEls.length || !activeTotalPathLength) return;
      const duration = 8600;
      const progress = ((now - animationStart) % duration) / duration;
      let remainingDistance = activeTotalPathLength * progress;
      let path = activePathEls[0];
      let pathLength = activePathLengths[0];
      for (let i = 0; i < activePathEls.length; i++) {
        path = activePathEls[i];
        pathLength = activePathLengths[i];
        if (remainingDistance <= pathLength || i === activePathEls.length - 1) break;
        remainingDistance -= pathLength;
      }
      const localDistance = Math.min(pathLength, Math.max(0, remainingDistance));
      const point = path.getPointAtLength(localDistance);
      const next = path.getPointAtLength(Math.min(pathLength, localDistance + 2));
      const svgRect = routeSvg.getBoundingClientRect();
      const stageRect = globeStage.getBoundingClientRect();
      const x = (point.x / 1000) * svgRect.width + svgRect.left - stageRect.left;
      const y = (point.y / 620) * svgRect.height + svgRect.top - stageRect.top;
      const dx = next.x - point.x;
      const dy = next.y - point.y;
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;
      plane.style.transform = `translate(${x - 16}px, ${y - 16}px) rotate(${angle}deg)`;
    }

    function animatePlane(now) {
      positionPlane(now);
      requestAnimationFrame(animatePlane);
    }

    function setActive(index) {
      active = (index + legs.length) % legs.length;
      renderTimeline();
      renderMarkers();
      renderCards();
      renderStatus();
      renderRoutes();
    }

    function toggleLeg(index) {
      const nextSegment = legs[index].segment;
      if (nextSegment !== legs[active].segment) {
        active = index;
        expandedLegs = new Set([index]);
      } else if (expandedLegs.has(index)) {
        expandedLegs.delete(index);
      } else {
        expandedLegs.add(index);
      }
      renderTimeline();
      renderMarkers();
      renderCards();
      renderStatus();
      renderRoutes();
    }

    function setSegment(segmentIndex) {
      const segment = tripSegments[(segmentIndex + tripSegments.length) % tripSegments.length];
      active = segment.legs[0];
      expandedLegs = new Set(segment.legs);
      renderTimeline();
      renderMarkers();
      renderCards();
      renderStatus();
      renderRoutes();
    }

    document.querySelector("#prev").addEventListener("click", () => setSegment(legs[active].segment - 1));
    document.querySelector("#next").addEventListener("click", () => setSegment(legs[active].segment + 1));
    window.addEventListener("keydown", event => {
      if (event.key === "ArrowLeft") setSegment(legs[active].segment - 1);
      if (event.key === "ArrowRight") setSegment(legs[active].segment + 1);
    });

    setActive(0);
    if (!reduceMotion) requestAnimationFrame(animatePlane);
  </script>
</body>
</html>
